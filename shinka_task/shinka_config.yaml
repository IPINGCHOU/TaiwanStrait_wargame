# ShinkaEvolve configuration for Taiwan Strait blockade wargame

evo_config:
  llm_models:
    - "gpt-5-mini"
  code_embed_sim_threshold: 0.85
  max_novelty_attempts: 5

db_config:
  num_islands: 3
  parent_selection_strategy: "weighted"
  exploitation_ratio: 0.6
  migration_interval: 10
  migration_rate: 0.2

max_evaluation_jobs: 2
max_proposal_jobs: 3
